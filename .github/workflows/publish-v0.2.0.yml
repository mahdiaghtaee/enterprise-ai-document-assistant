name: Publish v0.2.0

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-v0.2.0.yml

permissions:
  contents: write

jobs:
  publish:
    name: Publish v0.2.0
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Create tag and GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view v0.2.0 --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release v0.2.0 already exists."
            exit 0
          fi

          gh release create v0.2.0 \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "v0.2.0 — Persistent pgvector and ingestion-job foundation" \
            --notes-file docs/releases/v0.2.0.md
