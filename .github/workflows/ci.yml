name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build, test, and validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore API tests
        run: dotnet restore tests/api-dotnet/EnterpriseDocumentAssistant.Api.Tests.csproj

      - name: Run API tests
        run: dotnet test tests/api-dotnet/EnterpriseDocumentAssistant.Api.Tests.csproj --configuration Release --no-restore

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Build ASP.NET Core API image
        run: docker build -f src/api-dotnet/Dockerfile -t enterprise-document-api:ci .

      - name: Build Python AI service image
        run: docker build -f src/ai-service-python/Dockerfile -t enterprise-ai-service:ci .

      - name: Build full Docker Compose stack
        run: docker compose build
