name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  dotnet:
    name: .NET build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore API tests
        run: dotnet restore tests/api-dotnet/EnterpriseDocumentAssistant.Api.Tests.csproj

      - name: Run API tests with coverage
        run: >-
          dotnet test tests/api-dotnet/EnterpriseDocumentAssistant.Api.Tests.csproj
          --configuration Release
          --no-restore
          --collect:"XPlat Code Coverage"
          --results-directory tests/api-dotnet/TestResults

      - name: Enforce .NET coverage floors
        run: >-
          python3 scripts/check_coverage.py
          "tests/api-dotnet/TestResults/**/coverage.cobertura.xml"
          --minimum-line-rate 0.60
          --minimum-branch-rate 0.50

      - name: Upload .NET coverage
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-coverage
          path: tests/api-dotnet/TestResults/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 7

  python:
    name: Python lint and tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: src/ai-service-python/requirements-dev.txt

      - name: Install Python dependencies
        run: python -m pip install --requirement src/ai-service-python/requirements-dev.txt

      - name: Lint Python code
        run: ruff check src/ai-service-python/app tests/ai-service-python scripts/check_coverage.py

      - name: Check Python formatting
        run: ruff format --check src/ai-service-python/app tests/ai-service-python scripts/check_coverage.py

      - name: Run Python tests
        env:
          PYTHONPATH: src/ai-service-python
        run: pytest tests/ai-service-python

  containers:
    name: Compose build and health checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Build Docker Compose stack
        run: docker compose build

      - name: Start Docker Compose stack
        run: docker compose up --detach

      - name: Wait for service health endpoints
        shell: bash
        run: |
          set -euo pipefail

          wait_for_url() {
            local name="$1"
            local url="$2"

            for attempt in $(seq 1 30); do
              if curl --fail --silent --show-error "$url" > /dev/null; then
                echo "$name is ready"
                return 0
              fi

              echo "Waiting for $name ($attempt/30)"
              sleep 2
            done

            echo "$name did not become ready"
            return 1
          }

          wait_for_url "ASP.NET Core API" "http://localhost:5000/health"
          wait_for_url "FastAPI service" "http://localhost:8000/health"

      - name: Verify pgvector database schema
        shell: bash
        run: |
          set -euo pipefail

          query_database() {
            docker compose exec -T postgres psql \
              --username "${POSTGRES_USER:-documents}" \
              --dbname "${POSTGRES_DB:-documents}" \
              --no-psqlrc \
              --tuples-only \
              --no-align \
              --set ON_ERROR_STOP=1 \
              --command "$1"
          }

          test "$(query_database "SELECT count(*) FROM pg_extension WHERE extname = 'vector';")" = "1"
          test "$(query_database "SELECT count(*) FROM pg_attribute a JOIN pg_class c ON c.oid = a.attrelid JOIN pg_namespace n ON n.oid = c.relnamespace WHERE n.nspname = 'public' AND c.relname = 'document_chunks' AND a.attname = 'embedding' AND format_type(a.atttypid, a.atttypmod) = 'vector(8)';")" = "1"
          test "$(query_database "SELECT count(*) FROM pg_indexes WHERE schemaname = 'public' AND tablename = 'document_chunks' AND indexname = 'ix_document_chunks_embedding_cosine';")" = "1"

      - name: Show container status and logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down --volumes --remove-orphans
