name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Build ASP.NET Core API image
        run: docker build -f src/api-dotnet/Dockerfile -t enterprise-document-api:ci .

      - name: Build Python AI service image
        run: docker build -f src/ai-service-python/Dockerfile -t enterprise-ai-service:ci .

      - name: Build full Docker Compose stack
        run: docker compose build
