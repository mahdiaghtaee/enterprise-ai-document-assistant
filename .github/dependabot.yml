version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: nuget
    directory: /src/api-dotnet
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      api-nuget:
        patterns:
          - "*"

  - package-ecosystem: nuget
    directory: /tests/api-dotnet
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      test-nuget:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /src/ai-service-python
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /src/api-dotnet
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /src/ai-service-python
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
