services:
  document-api:
    build:
      context: .
      dockerfile: src/api-dotnet/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=documents;Username=documents;Password=documents
      Redis__ConnectionString: redis:6379
      AiService__BaseUrl: http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ai-service:
        condition: service_started

  web-ui:
    build:
      context: .
      dockerfile: src/web-ui/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - document-api

  ai-service:
    build:
      context: .
      dockerfile: src/ai-service-python/Dockerfile
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: documents
      POSTGRES_USER: documents
      POSTGRES_PASSWORD: documents
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U documents -d documents"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
