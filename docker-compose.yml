services:
  document-api:
    build:
      context: .
      dockerfile: src/api-dotnet/Dockerfile
    ports:
      - "${API_HOST_PORT:-5000}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB:-documents};Username=${POSTGRES_USER:-documents};Password=${POSTGRES_PASSWORD:-documents}
      Redis__ConnectionString: redis:6379
      AiService__BaseUrl: http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ai-service:
        condition: service_started

  web-ui:
    build:
      context: .
      dockerfile: src/web-ui/Dockerfile
    ports:
      - "${WEB_UI_HOST_PORT:-3000}:80"
    depends_on:
      - document-api

  ai-service:
    build:
      context: .
      dockerfile: src/ai-service-python/Dockerfile
    ports:
      - "${AI_SERVICE_HOST_PORT:-8000}:8000"

  postgres:
    image: pgvector/pgvector:0.8.5-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-documents}
      POSTGRES_USER: ${POSTGRES_USER:-documents}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-documents}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

volumes:
  postgres-data:
