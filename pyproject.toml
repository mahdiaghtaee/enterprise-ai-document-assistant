[tool.pytest.ini_options]
testpaths = ["tests/ai-service-python"]
addopts = "-q"

[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [".venv", "bin", "obj"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
